name: MyStand Parser Tools CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Verify generated parser samples
        run: python scripts/verify_parser_samples.py
      - name: Smoke installed compatibility links
        run: |
          PREFIX="$(mktemp -d)"
          python -m mystand_parser_tools install-links --prefix "$PREFIX"
          "$PREFIX/bin/mystand-parser" --input README.md --output "$PREFIX/readme-bin.json"
          "$PREFIX/mystand-parser" --input README.md --output "$PREFIX/readme-legacy.json"
      - name: Compile Python modules
        run: python -m compileall src scripts
      - name: Smoke HTTP service
        run: python scripts/http_smoke.py
